# ===== KANAGAWA WAVE THEME =====
# Colors from Kanagawa Wave palette:
# sumiInk0=#16161D, sumiInk1=#1F1F28, sumiInk2=#2A2A37, sumiInk3=#363646
# sumiInk4=#54546D, waveBlue1=#223249, waveBlue2=#2D4F67
# fujiWhite=#DCD7BA, oldWhite=#C8C093, crystalBlue=#7E9CD8
# springGreen=#98BB6C, springViolet1=#938AA9, oniViolet=#957FB8
# waveAqua1=#6A9589, waveAqua2=#7AA89F, sakuraPink=#D27E99
# peachRed=#FF5D62, surimiOrange=#FFA066, carpYellow=#E6C384

# Status bar position
set-option -g status-position top

# General status bar styling
set -g status-style "bg=default"
set -g status-justify "left"

# Left side - session name with background
set -g status-left-length 50
set -g status-left "#[fg=#1F1F28,bg=#98BB6C,bold]  #S #[bg=default] "

# Right side - empty
set -g status-right ""

# Window status styling - dot separated, transparent background
set -g window-status-format "#[fg=#54546D,bg=default]#I:#W"
set -g window-status-current-format "#[fg=#DCD7BA,bg=default,bold]#I:#W"
set -g window-status-separator "#[fg=#7AA89F,bg=default] · "

# Pane borders
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#7AA89F"

# Message styling
set -g message-style "fg=#DCD7BA,bg=#2A2A37"
set -g message-command-style "fg=#DCD7BA,bg=#2A2A37"

# Mode styling (copy mode, etc.)
set -g mode-style "fg=#1F1F28,bg=#98BB6C"

# Clock mode
set -g clock-mode-colour "#7AA89F"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
